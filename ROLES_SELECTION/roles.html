<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Select Role – KrishiSuraksha</title>
  <link rel="stylesheet" href="roles.css" />
</head>
<body>

  <!-- Floating background words -->
  <div class="bg-word farmer">FARMER</div>
  <div class="bg-word buyer">BUYER</div>
  <div class="bg-word admin">ADMIN</div>

  <!-- Glass container -->
  <div class="wrapper">
    <div class="header">
      <h1>Welcome to KrishiSuraksha</h1>
      <p>Select your role to continue</p>
    </div>

    <div class="roles">
      <!-- Farmer -->
      <div class="card" data-role="farmer">
        <img src="images/farmer.png" alt="Farmer Illustration" />
        <h3>Farmer</h3>
        <p>Weather, crops & market prices</p>
      </div>

      <!-- Buyer -->
      <div class="card" data-role="buyer">
        <img src="images/buyer.png" alt="Buyer Illustration" />
        <h3>Buyer</h3>
        <p>Buy fresh produce directly</p>
      </div>

      <!-- Admin -->
      <div class="card" data-role="admin">
        <img src="images/admin.png" alt="Admin Illustration" />
        <h3>Admin</h3>
        <p>Manage users & analytics</p>
      </div>
    </div>
  </div>

  <script src="roles.js"></script>
</body>
</html>
